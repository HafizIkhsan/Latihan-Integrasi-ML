name: CI/CD MLflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"
  MLFLOW_TRACKING_URI: "file:./mlruns"   # 🔥 WAJIB

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      # 🔥 RUN PROJECT (sudah pakai tracking lokal)
      - name: Run MLflow Project
        run: |
          mlflow run MLproject --env-manager=local

      # 🔍 DEBUG (biar keliatan struktur)
      - name: Check mlruns content
        run: |
          echo "=== mlruns structure ==="
          ls -R mlruns

      # ✅ AMBIL RUN_ID (robust)
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(find mlruns/0 -mindepth 1 -maxdepth 1 -type d ! -name "models" -exec basename {} \; | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      # 🔥 BUILD DOCKER
      - name: Build Docker Model
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "cc"

      # 🔐 LOGIN DOCKER
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 🏷️ TAG
      - name: Tag Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest

      # 🚀 PUSH
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
